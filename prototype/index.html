<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StrideOS Conversational Storefront</title>
    <link rel="stylesheet" href="styles.css?v=20260421-real-photos" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="Storefront header">
        <a class="brand" href="#" aria-label="StrideOS home">
          <span class="brand-mark" aria-hidden="true">S</span>
          <span>
            <strong>StrideOS</strong>
            <small>adaptive sportswear shop</small>
          </span>
        </a>

        <div class="topbar-actions" aria-label="Store controls">
          <button class="icon-button" id="resetButton" type="button" title="Reset storefront" aria-label="Reset storefront">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5.7 7.1A8 8 0 1 1 4 12h2.1a5.9 5.9 0 1 0 1.3-3.7l2.2 2.2H3.8V4.7l1.9 2.4Z" />
            </svg>
          </button>
          <button class="cart-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 18.5a1.7 1.7 0 1 0 0 3.4 1.7 1.7 0 0 0 0-3.4Zm10 0a1.7 1.7 0 1 0 0 3.4 1.7 1.7 0 0 0 0-3.4ZM5.5 4l.4 2H21l-2 8.2a2.2 2.2 0 0 1-2.1 1.7H8.1a2.2 2.2 0 0 1-2.1-1.7L3.7 3H1V1h4a1 1 0 0 1 1 .8L6.4 4h-.9Zm1.3 4 1.2 5.7c0 .1.1.2.2.2h8.7c.1 0 .2-.1.2-.2L18.5 8H6.8Z" />
            </svg>
            <span id="cartCount">0</span>
          </button>
        </div>
      </header>

      <main class="store-layout">
        <section class="storefront" aria-label="Adaptive product catalogue">
          <div class="storefront-header">
            <div>
              <p class="eyebrow" id="intentLabel">Browsing all sportswear</p>
              <h1 id="catalogueTitle">Find the right gear</h1>
            </div>
            <div class="result-meter">
              <strong id="resultCount">100</strong>
              <span>matches</span>
            </div>
          </div>

          <div class="filter-strip" id="filterStrip" aria-label="Active filters"></div>

          <section class="shopping-brief" id="shoppingBrief" aria-label="Shopping brief"></section>

          <section class="compare-panel hidden" id="comparePanel" aria-label="Product comparison"></section>

          <div class="catalogue-toolbar">
            <div class="segmented-control" aria-label="Catalogue view">
              <button class="active" type="button" data-view="recommended">Recommended</button>
              <button type="button" data-view="price">Price</button>
              <button type="button" data-view="performance">Performance</button>
            </div>
            <label class="select-label" for="sortSelect">
              <span>Sort</span>
              <select id="sortSelect">
                <option value="recommended">Best match</option>
                <option value="low">Lowest price</option>
                <option value="high">Highest price</option>
                <option value="rating">Top rated</option>
              </select>
            </label>
          </div>

          <section class="product-grid" id="productGrid" aria-live="polite"></section>
        </section>

        <aside class="chat-panel" aria-label="Shopping chat">
          <div class="chat-header">
            <div>
              <p class="eyebrow">Shopping assistant</p>
              <h2>Tell me what you need</h2>
            </div>
            <span class="status-dot" aria-label="Assistant online"></span>
          </div>

          <div class="chat-messages" id="chatMessages" aria-live="polite"></div>

          <div class="prompt-row" aria-label="Example requests">
            <button type="button" data-prompt="I need breathable running clothes under $75">Running under $75</button>
            <button type="button" data-prompt="Show me yoga leggings with pockets">Yoga leggings</button>
            <button type="button" data-prompt="I need a waterproof jacket for hiking">Trail rain layer</button>
            <button type="button" data-prompt="Compare the first two">Compare</button>
          </div>

          <form class="chat-form" id="chatForm">
            <label class="sr-only" for="chatInput">Message</label>
            <input id="chatInput" name="message" type="text" autocomplete="off" placeholder="What are you shopping for?" />
            <button class="send-button" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m3 20 18-8L3 4v6l11 2-11 2v6Z" />
              </svg>
            </button>
          </form>
        </aside>
      </main>
    </div>

    <script src="app.js?v=20260421-real-photos"></script>
  </body>
</html>
